<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tip Calculator</title>
  <link rel="stylesheet" href="tip.css" />
</head>
<body>

  <div class="container">

    <div class="wrapper">
      <p>Bill ₹</p>
      <input type="number" id="amount" placeholder="Amount to be paid" />

      <p>Select Tip %</p>
      <div class="Tips">
        <div class="Tip">5%</div>
        <div class="Tip">15%</div>
        <div class="Tip">20%</div>
        <div class="Tip">25%</div>
        <div class="Tip">50%</div>
      </div>

      <p>Number of people</p>
      <input type="number" id="people" placeholder="Number of people sharing the bill" />

      <button id="calculate">Calculate</button>
    </div>

    <div class="right-wrapper">
      <div class="theme-switch">
        <input type="checkbox" id="themeToggle" />
        <label for="themeToggle"></label>
      </div>

      <p>Tip amount: ₹ <span id="tipAmount">0</span> <span>each</span></p>
      <p>Total: ₹ <span id="totalAmount">0</span> <span>each</span></p>

      <button id="reset">Reset</button>
    </div>

  </div>

  <style>
.back-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    padding: 8px 15px;
    background-color: black;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
.back-btn:hover {
    background-color: #333;
}
</style>

<button class="back-btn"
onclick="window.location.href='index.html'">
⬅ Back
</button>

  <script src="app.js"></script>
</body>
</html>
