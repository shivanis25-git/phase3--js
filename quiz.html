<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz Yahoo Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="quiz.css">
</head>
<body>

<div class="overlay"></div>

<div class="quiz-container">

    <div class="top-bar">
        <button id="darkToggle">🌙</button>
        <p id="timer">Time: 15s</p>
    </div>

    <h1>Quiz Yahoo</h1>

    <div class="progress">
        <div id="progressBar"></div>
    </div>
                                                                
    <div id="quiz-box">
        <h2 id="question"></h2>

        <div class="options">
            <button class="option-btn"></button>
            <button class="option-btn"></button>
            <button class="option-btn"></button>
            <button class="option-btn"></button>
        </div>

        <button id="nextBtn" class="main-btn">Next</button>
    </div>

    <div id="result-box" class="hide">
        <h2>Your Score</h2>
        <p id="score"></p>
        <div id="review" class="review-box"></div>
        <button id="restartBtn" class="main-btn">Restart Quiz</button>
    </div>

</div>

<style>
.back-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    padding: 8px 15px;
    background-color: black;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}
.back-btn:hover {
    background-color: #333;
}
</style>

<button class="back-btn"
onclick="window.location.href='index.html'">
⬅ Back
</button>

<script src="script.js"></script>
</body>
</html>
